name: workshop-catalog-sync

on:
  schedule:
    # Full sync once a day. 04:07 UTC dodges the every-15-min ticks below so the two
    # do not collide at the top of the hour. Change the time here (cron is UTC).
    - cron: "7 4 * * *"
    # Delta sync every 15 minutes. GitHub's scheduler is best-effort and often runs a few
    # minutes late, which is fine for a mod catalog. 15 min is comfortably above the 5-min floor.
    - cron: "*/15 * * * *"
  # Lets you run either sync by hand from the Actions tab (use this to test first).
  workflow_dispatch:
    inputs:
      mode:
        description: "Which sync to run"
        type: choice
        default: full
        options: [full, delta]

# Never run two syncs at once: a full crawl takes a few minutes, so let a running one
# finish rather than cancel it, and drop any extra run that queues up behind it.
concurrency:
  group: workshop-catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets the job commit the catalog back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide mode (full on the daily cron, delta otherwise)
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "7 4 * * *" ]; then
              MODE=full
            else
              MODE=delta
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running $MODE sync"

      - name: Run sync
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: node sync.mjs ${{ steps.mode.outputs.mode }}

      - name: Commit catalog if it changed
        run: |
          git config user.name "dzmg-catalog-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/workshop-catalog.json
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "catalog ${{ steps.mode.outputs.mode }} sync $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin "${{ github.ref_name }}" || true
            git push
          fi
