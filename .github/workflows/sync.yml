name: workshop-catalog-sync

on:
  schedule:
    # Full sync once a day. 
    - cron: "7 4 * * *"
    # Delta sync every 15 minutes. GitHub's scheduler is best-effort and often runs a few
    # minutes late, which is fine for a mod catalog.
    - cron: "*/15 * * * *"
  # Lets you run a sync by hand from the Actions tab. "test" crawls only a few pages and
  # uploads the result as a throwaway
  workflow_dispatch:
    inputs:
      mode:
        description: "Which sync to run"
        type: choice
        default: full
        options: [full, delta, test]

# Never run two syncs at once: a full crawl takes a few minutes, so let a running one
# finish rather than cancel it, and drop any extra run that queues up behind it.
concurrency:
  group: workshop-catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets the job create/update the catalog release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide mode (full on the daily cron, delta otherwise)
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "7 4 * * *" ]; then
              MODE=full
            else
              MODE=delta
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running $MODE sync"

      - name: Run sync
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: node sync.mjs ${{ steps.mode.outputs.mode }}

      # The catalog is over GitHub's 100 MB file push limit, so it is
      # gzipped by sync.mjs and published as a Release asset instead of committed. A delta run
      # with no changes writes no file, so the hashFiles guard skips the upload that time.
      # Test runs are excluded here and handled by the artifact step below.
      - name: Publish catalog to the release
        if: steps.mode.outputs.mode != 'test' && hashFiles('workshop-catalog.json.gz') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: catalog
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" \
                 --title "DayZ Workshop catalog" \
                 --notes "Auto-updated by workshop-catalog-sync. Download the latest asset below."
          gh release upload "$RELEASE_TAG" workshop-catalog.json.gz --clobber
          echo "Published workshop-catalog.json.gz to release '$RELEASE_TAG'."

      # Test runs upload the partial catalog as a run artifact so you can download and inspect
      # it, without ever overwriting the live 'catalog' release asset.
      - name: Upload test catalog artifact
        if: steps.mode.outputs.mode == 'test' && hashFiles('workshop-catalog.json.gz') != ''
        uses: actions/upload-artifact@v4
        with:
          name: workshop-catalog-test
          path: workshop-catalog.json.gz
          retention-days: 7
